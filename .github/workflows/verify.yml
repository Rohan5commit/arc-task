name: verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start > /tmp/arc-task.log 2>&1 &
        env:
          PORT: 3000
          PAYMENT_MODE: demo
          NEXT_PUBLIC_PAYMENT_MODE: demo

      - name: API smoke
        run: npm run smoke
        env:
          SMOKE_BASE_URL: http://127.0.0.1:3000
          PAYMENT_MODE: demo
          NEXT_PUBLIC_PAYMENT_MODE: demo

      - name: Print server log on failure
        if: failure()
        run: cat /tmp/arc-task.log
